<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wippy - Sign In</title>
    <meta name="color-scheme" content="light dark">
    <!-- Theme persistence (facade-generated): applies the stored theme before
         paint and exposes window.wippyThemePersist (read/write/apply). The theme
         switcher below calls write() so a choice made here carries into the host.
         No-op when the facade's theme_persist is "none". Loaded first so the
         w-theme-* class is set before the CDN stylesheets below apply tokens. -->
    <script src="/api/public/facade/theme-persist.js"></script>
    <link rel="stylesheet" href="https://web-host.wippy.ai/webcomponents-1.0.45/@wippy-fe/assets/theme-config.css">
    <link rel="stylesheet" href="https://web-host.wippy.ai/webcomponents-1.0.45/@wippy-fe/assets/preflight.css">
    <link rel="stylesheet" href="https://web-host.wippy.ai/webcomponents-1.0.45/@wippy-fe/assets/iframe.css">
    <link rel="stylesheet" href="https://web-host.wippy.ai/webcomponents-1.0.45/@wippy-fe/assets/tailwind.css">
    <!-- App theme for this non-host page: CSS variables via the facade API
         (/facade/variables.css converts the app's css_variables JSON to :root CSS)
         + the same global custom CSS the host applies (served from content_fs).
         Keeps login.html in sync with the app theme without the Wippy host. -->
    <link rel="stylesheet" href="/api/public/facade/variables.css">
    <link rel="stylesheet" href="/app/custom-css.facade.css">
    <!-- Honor the app's forced theme (facade `theme_mode`) on this standalone
         pre-auth page. The 4 static CDN links above are version-pinned and flip
         with the OS only — keep their version in lockstep with `fe_facade_url` on
         release (they live in app static/, outside the facade's version bump).
         Below we (1) stamp the w-theme-* class from the facade config and (2)
         re-load theme-config.css + tailwind.css from facade_url so the host's
         forcing-aware copies win the cascade (in prod the same URL = cache hit;
         locally = the dev build). Caveats: themeMode is only known after the async
         config fetch, so a forced theme causes a brief OS->forced flip on first
         paint; if facade_url is empty the class is still stamped but forcing only
         applies once the static theme-config itself carries the .w-theme-* rules;
         if the config endpoint is unreachable we fall back to the OS theme. -->
    <script>
        (async function () {
            try {
                var cfg = await (await fetch('/api/public/facade/config')).json();
                // A persisted choice (set via the switcher / shared with the host)
                // wins over the facade default; theme-persist.js already applied it.
                var persisted = window.wippyThemePersist && window.wippyThemePersist.read();
                var mode = persisted || cfg.themeMode;
                if (mode === 'dark' || mode === 'light') {
                    document.documentElement.classList.add('w-theme-' + mode);
                    document.documentElement.style.colorScheme = mode;
                }
                if (cfg.facade_url) {
                    // Appended last → win the cascade over the static CDN links.
                    // theme-config.css carries the .w-theme-* token rules; tailwind.css
                    // carries the forcing-aware PrimeVue component styles (e.g. .p-card).
                    // In prod facade_url === the static CDN base, so these resolve to the
                    // same URLs (cache hit, no double-download); locally they load the
                    // forcing-aware host build from the dev server.
                    ['theme-config.css', 'tailwind.css'].forEach(function (file) {
                        var link = document.createElement('link');
                        link.rel = 'stylesheet';
                        link.href = cfg.facade_url + '/@wippy-fe/assets/' + file;
                        document.head.appendChild(link);
                    });
                }
            } catch (e) { /* pre-auth config unavailable — fall back to OS theme */ }
        })();
    </script>
    <style>
        body {
            background: color-mix(in srgb, var(--p-content-background) 92%, var(--p-text-color) 8%);
            color: var(--p-text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card .p-card-body {
            padding: 32px;
        }

        .login-card {
            width: 100%;
            max-width: 380px;
        }

        .brand {
            text-align: center;
            margin-bottom: 28px;
        }

        .brand-icon {
            display: inline-block;
            width: 64px;
            height: 64px;
            margin-bottom: 14px;
        }

        .brand-icon img { width: 100%; height: 100%; }

        .brand h1 {
            font-size: 16px;
            font-weight: 600;
            color: var(--p-text-color);
            letter-spacing: -0.01em;
        }

        .brand p {
            font-size: 13px;
            color: var(--p-text-muted-color);
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--p-text-muted-color);
            margin-bottom: 6px;
        }

        .form-group .p-inputtext {
            width: 100%;
        }

        #error.p-message {
            display: none;
            margin-bottom: 16px;
        }

        .submit-btn {
            width: 100%;
        }

        /* Segmented theme control — mirrors the in-app sidebar switcher:
           a subtle track with a raised active pill and primary-tinted icon. */
        #theme-switch.theme-switch {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            margin-top: 14px;
            padding: 2px;
            border-radius: 8px;
            background: var(--p-surface-200);
        }
        .theme-switch .theme-opt {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 30px;
            padding: 0;
            border: none;
            border-radius: 6px;
            background: transparent;
            color: var(--p-surface-500);
            cursor: pointer;
            transition: background-color .15s, color .15s;
        }
        .theme-switch .theme-opt:hover { color: var(--p-surface-700); }
        .theme-switch .theme-opt.active {
            background: var(--p-surface-0);
            color: var(--p-primary);
            box-shadow: 0 1px 2px rgba(0, 0, 0, .06);
        }
        .theme-switch .theme-opt svg { width: 16px; height: 16px; }

        /* Dark: mirror the nav's surface-900 track / surface-700 raised pill. */
        .w-theme-dark #theme-switch.theme-switch { background: var(--p-surface-900); }
        .w-theme-dark .theme-switch .theme-opt:hover { color: var(--p-surface-300); }
        .w-theme-dark .theme-switch .theme-opt.active { background: var(--p-surface-700); color: var(--p-primary); }
    </style>
</head>
<body>
    <div class="login-card p-card p-component">
        <div class="p-card-body">
            <div class="p-card-content">
                <div class="brand">
                    <div class="brand-icon">
                        <img src="/app/wippy-logo.svg" alt="Wippy">
                    </div>
                    <h1>Wippy App</h1>
                    <p>Sign in to continue</p>
                    <!-- Theme switcher (static-login example): a single segmented
                         control; the active segment shows the current mode. Persists
                         via window.wippyThemePersist so the choice survives reload
                         and carries into the host. -->
                    <div id="theme-switch" class="theme-switch" role="group" aria-label="Theme">
                        <button type="button" class="theme-opt" data-mode="auto" title="Auto (system)" aria-label="Auto">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 5a1 1 0 0 1 1-1h16a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1zm4 15h10m-8-4v4m6-4v4"/></svg>
                        </button>
                        <button type="button" class="theme-opt" data-mode="light" title="Light" aria-label="Light">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 12a4 4 0 1 0 8 0a4 4 0 1 0-8 0m-5 0h1m8-9v1m8 8h1m-9 8v1M5.6 5.6l.7.7m12.1-.7l-.7.7m0 11.4l.7.7m-12.1-.7l-.7.7"/></svg>
                        </button>
                        <button type="button" class="theme-opt" data-mode="dark" title="Dark" aria-label="Dark">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3h.393a7.5 7.5 0 0 0 7.92 12.446A9 9 0 1 1 12 2.992z"/></svg>
                        </button>
                    </div>
                </div>
                <div id="error" class="p-message p-component p-message-error" role="alert" aria-live="assertive" aria-atomic="true">
                    <div class="p-message-content">
                        <svg class="p-message-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M15 9l-6 6m0-6l6 6"/></svg>
                        <div class="p-message-text"></div>
                    </div>
                </div>
                <form id="login-form" aria-label="Sign in">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input id="email" type="email" required autocomplete="email" autofocus placeholder="you@example.com" class="p-inputtext p-component">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input id="password" type="password" required autocomplete="current-password" placeholder="Enter password" class="p-inputtext p-component">
                    </div>
                    <button type="submit" class="p-button p-component submit-btn" id="submit-btn">Sign In</button>
                </form>
            </div>
        </div>
    </div>
    <script>
        // Theme switcher: apply immediately + persist (cookie/localStorage per
        // the facade's theme_persist). The host reads the same key on next load.
        (function () {
            var sw = document.getElementById('theme-switch');
            if (!sw) return;
            // Current selected mode: the persisted choice if any, else whatever
            // class is currently applied (auto when none).
            function currentMode() {
                var tp = window.wippyThemePersist;
                var v = tp && tp.read();
                if (v === 'light' || v === 'dark' || v === 'auto') return v;
                var c = document.documentElement.classList;
                return c.contains('w-theme-dark') ? 'dark' : c.contains('w-theme-light') ? 'light' : 'auto';
            }
            function setActive(mode) {
                sw.querySelectorAll('[data-mode]').forEach(function (b) {
                    var on = b.getAttribute('data-mode') === mode;
                    b.classList.toggle('active', on);
                    b.setAttribute('aria-pressed', on ? 'true' : 'false');
                });
            }
            setActive(currentMode());
            sw.querySelectorAll('[data-mode]').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    var mode = btn.getAttribute('data-mode');
                    // Look up at click time (not captured once) so a slow/late
                    // theme-persist.js still persists rather than silently no-op.
                    var tp = window.wippyThemePersist;
                    if (tp) { tp.apply(mode); tp.write(mode); }
                    else {
                        document.documentElement.classList.toggle('w-theme-dark', mode === 'dark');
                        document.documentElement.classList.toggle('w-theme-light', mode === 'light');
                    }
                    setActive(mode);
                });
            });
        })();

        const form = document.getElementById('login-form');
        const errorEl = document.getElementById('error');
        const errorTextEl = errorEl.querySelector('.p-message-text');
        const submitBtn = document.getElementById('submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.style.display = 'none';
            errorTextEl.textContent = '';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';

            try {
                const res = await fetch('/api/public/user/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });

                const data = await res.json();

                if (!res.ok || !data.success) {
                    throw new Error(data.error || 'Login failed');
                }

                localStorage.setItem('@wippy_token_info', JSON.stringify({ token: data.token }));
                window.location.href = '/';
            } catch (err) {
                errorTextEl.textContent = err.message;
                errorEl.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
