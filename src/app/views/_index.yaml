version: "1.0"
namespace: app.views

# All entries below are MIGRATED to wippy-meta.json (vite plugin emits it).
# Per views ≥ 0.5.0, only registry-routing + deployment-policy fields stay
# in YAML. The FE module's package.json `wippy` block is the source of
# truth for title / props / events / proxy.injections / customCSS.
#
# `meta.entry_point` is the operator's deploy-aware override of the
# source-relative path in package.json (e.g. `dist/app.html` →
# `app.html` because vite's --outDir flattens it).

entries:
  - name: main
    kind: registry.entry
    meta:
      type: view.page
      name: main
      title: Admin Panel
      icon: tabler:layout-dashboard
      order: 0
      announced: true
      secure: false
      url: /app
      base_path: app/main
      entry_point: app.html
      mountRoute: /home/:part(.*)*

  - name: iframe-demo
    kind: registry.entry
    meta:
      type: view.page
      name: iframe-demo
      title: Iframe Demo
      icon: tabler:frame
      order: 3
      announced: true
      secure: false
      url: /app
      base_path: app/iframe-demo
      entry_point: app.html
      mountRoute: /demo/:part(.*)*

  # Variant: shares iframe-demo's bundle, adds a custom palette via
  # meta.config_overrides (deep-merged over bundled wippy.configOverrides;
  # YAML wins per nested key — must use camelCase to match).
  - name: iframe-demo-themed
    kind: registry.entry
    meta:
      type: view.page
      name: iframe-demo-themed
      title: Iframe Demo (Custom Palette)
      icon: tabler:paint
      order: 4
      announced: false
      secure: false
      url: /app
      base_path: app/iframe-demo
      entry_point: app.html
      mountRoute: /demo-themed/:part(.*)*
      config_overrides:
        customization:
          cssVariables:
            "--p-primary": "#7c9ed9"
            "--p-primary-color": "#7c9ed9"
            "--p-danger": "#e8a0a0"
            "--p-warn": "#c5c88a"
            "--p-secondary": "#b4a7d6"
            "--p-accent": "#8cc5b5"
            "--p-surface-0": "#fffcf7"
            "--p-surface-50": "#faf6ef"
            "--p-surface-100": "#f3ede3"
            "--p-surface-200": "#e8dfd1"
            "--p-surface-300": "#d6cab8"
            "--p-surface-400": "#b0a48f"
            "--p-surface-500": "#8a7e6b"
            "--p-surface-600": "#6b6052"
            "--p-surface-700": "#524a3e"
            "--p-surface-800": "#3a342b"
            "--p-surface-900": "#262019"
            "--p-surface-950": "#141008"
          customCSS: |
            @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap');
            :root, body, * { font-family: 'Quicksand', sans-serif !important; }

  - name: reaction-bar
    kind: registry.entry
    meta:
      type: view.component
      name: reaction-bar
      tag_name: example-reaction-bar
      announced: true
      secure: false
      auto_register: true
      url: /app/wc/reaction-bar
      entry_point: index.js

  - name: websocket-log
    kind: registry.entry
    meta:
      type: view.component
      name: websocket-log
      tag_name: example-websocket-log
      announced: true
      secure: false
      auto_register: true
      url: /app/wc/websocket-log
      entry_point: index.js

  - name: chart-circle
    kind: registry.entry
    meta:
      type: view.component
      name: chart-circle
      tag_name: example-chart-circle
      announced: true
      secure: false
      auto_register: true
      url: /app/wc/chart-circle
      entry_point: index.js

  - name: mermaid
    kind: registry.entry
    meta:
      type: view.component
      name: mermaid
      tag_name: example-mermaid
      announced: true
      secure: false
      auto_register: true
      url: /app/wc/mermaid
      entry_point: index.js

  - name: markdown
    kind: registry.entry
    meta:
      type: view.component
      name: markdown
      tag_name: example-markdown
      announced: true
      secure: false
      auto_register: true
      url: /app/wc/markdown
      entry_point: index.js

  - name: counter-persist
    kind: registry.entry
    meta:
      type: view.component
      name: counter-persist
      tag_name: example-counter-persist
      announced: true
      secure: false
      auto_register: true
      url: /app/wc/counter-persist
