version: "1.0"
namespace: app.api

entries:
  - name: hello
    kind: function.lua
    source: file://hello.lua
    modules:
      - http
    method: handler
    pool:
      size: 4

  - name: hello.endpoint
    kind: http.endpoint
    meta:
      router: app:api.public
    method: GET
    func: hello
    path: /hello
