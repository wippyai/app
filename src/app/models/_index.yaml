version: "1.0"
namespace: app.models

# Models are referenced two ways:
#   - by name:  model: claude-sonnet-4-6
#   - by class: model: class:fast   (highest-priority model in that class wins)
# Keeper's bundled agents resolve class:smart / orchestrator / fast / nano /
# coder / embed, so those classes must always have a member here.

entries:
  # ── Claude ──
  - name: claude-opus-4-6
    kind: registry.entry
    meta:
      name: claude-opus-4-6
      type: llm.model
      title: Claude Opus 4.6
      comment: Most capable model for complex reasoning and coding
      capabilities:
        - tool_use
        - vision
        - generate
        - structured_output
        - coding
        - extended_thinking
      class:
        - premium
        - smart
      priority: 100
    max_tokens: 200000
    output_tokens: 32768
    pricing:
      input: 15
      output: 75
      cached_input: 1.5
      cache_write: 18.75
    providers:
      - id: wippy.llm.claude:provider
        provider_model: claude-opus-4-6

  - name: claude-sonnet-4-6
    kind: registry.entry
    meta:
      name: claude-sonnet-4-6
      type: llm.model
      title: Claude Sonnet 4.6
      comment: Balanced default for complex tasks, orchestration, and coding
      capabilities:
        - tool_use
        - vision
        - generate
        - structured_output
        - coding
        - extended_thinking
      class:
        - default
        - balanced
        - orchestrator
        - coder
        - coding
      priority: 93
    max_tokens: 200000
    output_tokens: 16384
    pricing:
      input: 3
      output: 15
      cached_input: 0.3
      cache_write: 3.75
    providers:
      - id: wippy.llm.claude:provider
        provider_model: claude-sonnet-4-6

  - name: claude-haiku-4-5
