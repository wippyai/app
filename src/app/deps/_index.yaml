version: "1.0"
namespace: app.deps

entries:
  - name: users
    kind: ns.dependency
    component: userspace/users
    version: '>=v0.1.0'
    parameters:
      - name: env_storage
        value: app.env:store
      # userspace/users publishes namespace userspace.user (not userspace.users),
      # so bare parameter names don't reach it; address the requirements by full id.
      - name: userspace.user:public_router
        value: app:api.public
      - name: userspace.user:router
        value: app:api

  - name: uploads
    kind: ns.dependency
    component: userspace/uploads
    version: '>=v0.4.0'
    parameters:
      - name: database_resource
        value: app:db
      - name: env_storage
        value: app.env:store
      - name: router
        value: app:api

  - name: bootloader
    kind: ns.dependency
    component: wippy/bootloader
    version: '>=v0.0.9'
    parameters:
      - name: application_host
        value: app:processes
      - name: app_db
        value: app:db
      - name: env_storage
        value: app.env:store

  - name: migration
    kind: ns.dependency
    component: wippy/migration
    version: '>=v0.0.7'
    parameters:
      - name: app_db
        value: app:db

  - name: llm
    kind: ns.dependency
    component: wippy/llm
    version: '>=v0.2.10'
    parameters:
      - name: process_host
        value: app:processes
      - name: env_storage
        value: app.env:store

  - name: agent
    kind: ns.dependency
    component: wippy/agent
    version: '>=v0.2.1'

  - name: relay
    kind: ns.dependency
    component: wippy/relay
    version: '>=v0.2.1'
    parameters:
      - name: user_security_scope
        value: app.security:user
      - name: env_storage
        value: app.env:store
      - name: application_host
        value: app:processes
      - name: max_connections_per_user
        value: "12"
      - name: queue_multiplier
        value: "100"
      - name: user_hub_inactivity_timeout
        value: 7200s

  - name: session
    kind: ns.dependency
    component: wippy/session
    version: '>=v0.1.0'
    parameters:
      - name: api_router
        value: app:api
      - name: database_resource
        value: app:db
      - name: default_host
        value: app:processes
      - name: env_storage
        value: app.env:store
      - name: delegation_func_id
        value: userspace.dataflow.session:delegate
      - name: token_checkpoint_threshold
        value: "32000"
      - name: max_message_limit
        value: "500"
      - name: gc_interval
        value: 300s

  - name: terminal
    kind: ns.dependency
    component: wippy/terminal
    version: '>=v0.0.7'

  - name: test
    kind: ns.dependency
    component: wippy/test
    version: '>=v0.0.8'

  - name: views
    kind: ns.dependency
    component: wippy/views
    version: '>=v0.0.13'
    parameters:
      - name: api_router
        value: app:api.public
      - name: env_storage
        value: app.env:store

  - name: security
    kind: ns.dependency
    component: wippy/security
    version: '>=v0.0.7'

  - name: usage
    kind: ns.dependency
    component: wippy/usage
    version: '>=v0.2.1'
    parameters:
      - name: target_db
        value: app:db

  - name: dataflow
    kind: ns.dependency
    component: wippy/dataflow
    version: '>=v0.1.0'
    parameters:
      - name: target_db
        value: app:db

  - name: wc-mermaid
    kind: ns.dependency
    component: wippy-swiss/mermaid
    version: '>=v0.1.0'
    parameters:
      - name: server
        value: app:gateway

  - name: wc-markdown
    kind: ns.dependency
    component: wippy-swiss/markdown
    version: '>=v0.1.0'
    parameters:
      - name: server
        value: app:gateway

  - name: wc-chartjs
    kind: ns.dependency
    component: wippy-swiss/chartjs
    version: '>=v0.1.0'
    parameters:
      - name: server
        value: app:gateway

  # wc-voice (wippy-swiss/voice 0.1.2) removed: its tts_token.endpoint entry
  # ships without router metadata and aborts boot ("router metadata is
  # required"). Not needed for the theming e2e harness.

  - name: keeper
    kind: ns.dependency
    component: keeper/keeper
    version: '>=v0.5.18'
    parameters:
      - name: api_router
        value: app:api
      - name: app_db
        value: app:db
      - name: admin_scope
        value: app.security:admin
      - name: env_storage
        value: app.env:store
      - name: public_gateway
        value: app:gateway
      - name: mcp_route
        value: /keeper-mcp/
      - name: ui_server
        value: app:gateway
      - name: process_host
        value: app:processes

  - name: facade
    kind: ns.dependency
    component: wippy/facade
    version: '>=v0.5.37'
    parameters:
      - name: server
        value: app:gateway
      - name: router
        value: app:api.public
      - name: app_title
        value: Wippy App
      - name: app_name
        value: Wippy App
      - name: app_icon
        value: "wippy:logo"
      - name: show_admin
        value: "false"
      - name: hide_nav_bar
        value: "true"
      # Default login is the Jet page at /login (server-side cookie theme
      # rendering). The static static/login.html (/app/login.html) is the
      # alternative example.
      - name: login_path
        value: /login
      - name: session_type
        value: non-persistent
      - name: history_mode
        value: browser
      # Follow the OS theme by default. Set 'dark'/'light' to force a theme
      # regardless of OS; the sidebar switch can still override at runtime.
      - name: theme_mode
        value: auto
      # Theme persistence is OPT-IN: the facade defaults theme_persist to "none"
      # (no persistence). This app opts in with "cookie" so the Jet shell + Jet
      # login apply the saved theme server-side (no flash); "localStorage" is the
      # client-only alternative. The facade serves
      # /api/public/facade/theme-persist.js with this key baked in.
      - name: theme_persist
        value: cookie
      - name: theme_storage_key
        value: "@wippy-theme-mode"
      # Theming files live in ./static alongside login.html (served at /app), so
      # content_fs resolves them from the same folder a static page could <link>.
      # `fs://` (not `file://`) keeps the value literal: the wippy loader reserves
      # `file://` for its own load-time interpolation, so `file://` here would be
      # read+inlined relative to THIS yaml's dir instead of reaching content_fs.
      - name: custom_css
        value: "fs://custom-css.facade.css"
      - name: css_variables
        value: "fs://css-variables.facade.json"
      - name: content_fs
        value: app:app_fs
      # Three-state so it follows a forced themeMode too (not just OS):
      # base light + auto-dark (gated against forced-light) + forced-dark class.
      - name: host_custom_css
        value: ".wippy-host-app .chat-container { background-color: var(--p-surface-100); } @media (prefers-color-scheme: dark) { :root:not(.w-theme-light) .wippy-host-app .chat-container { background-color: var(--p-surface-800); } } :root.w-theme-dark .wippy-host-app .chat-container { background-color: var(--p-surface-800); }"
