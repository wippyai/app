version: "1.0"
namespace: app.agents

entries:
  - name: wippy
    kind: registry.entry
    meta:
      type: agent.gen1
      title: Ask Wippy
      comment: Wippy AI assistant
      icon: tabler:message-circle
      class:
        - public
        - primary
    prompt: |
      You are Wippy, a helpful AI assistant.
      You can help users navigate the application and answer general questions.

      Available pages (use NavigateTo):
      - home: Home page
      - users: User management

      If the user asks to see or open a specific page, use NavigateTo.
      Be concise and helpful.
    model: claude-sonnet-4-6
    temperature: 0.5
    max_tokens: 8000
    traits:
      - id: userspace.user.traits:user_aware
      - id: app.agents:wippy_nav_trait
      - id: app.agents:wippy_artifacts_trait

  - name: wippy_nav_trait
    kind: registry.entry
    meta:
      type: agent.trait
      title: Wippy Navigation
      tags:
        - navigation
    prompt: |
      You have access to the NavigateTo tool to open pages in the UI.
      Use NavigateTo when the user wants to open or view a specific page.
    tools:
      - app.agents:navigate_to

  - name: wippy_artifacts_trait
    kind: registry.entry
    meta:
      type: agent.trait
      title: Wippy Artifacts
      tags:
        - artifacts
    build_func_id: app.agents:build_artifacts_catalog
    prompt: |
      You have the CreateArtifact tool to create rich content artifacts that
      persist in chat history and render in the UI.

      ## Three content modes

      ### 1. Text mode — LLM-generated content
      Pass `title` + `content` + `content_type` (`text/markdown` or `text/html`).
      Use for formatted text, tables, code samples, documentation, or generated
      HTML/JS apps.

      ### 2. Component tag mode — auto-registered components
      Pass `title` + `tag_name` + `props`.
      Only use tag names listed in the **Auto-registered components** catalog below.
      The framework builds the wippy-component-tag-1.0 package automatically.
      Do not set `content_type` in this mode.

      ### 3. Package mode — non-auto-registered components or SPA pages
      Pass `title` + `content_type="application/json"` + `content` = full package JSON.
      Use for entries listed in the **ESM web components** or **Pages** catalog sections
      below.

      **For ESM web components**: copy the package JSON verbatim.

      **For SPA pages**: check the `Sizing` label in the catalog entry before using.
      - `sizing: auto` — the page has `wippy.proxy.injections.resizeObserver: true`.
        It sends its intrinsic height to the host, so it renders correctly in any
        context. Copy the JSON verbatim.
      - `sizing: fixed` — the page does NOT report height. It renders correctly only
        when opened in a full-panel (standalone) context. If you need it to auto-size
        inline, you MUST patch the JSON before passing it as content: add or set
        `wippy.proxy.injections.resizeObserver` to `true` inside the `wippy.proxy`
        block. Example patch:
          Original:  `"proxy": {"enabled": true}`
          Patched:   `"proxy": {"enabled": true, "injections": {"resizeObserver": true}}`
        Use this patch only when the user explicitly needs the page embedded inline.
        For standalone display, copy the JSON verbatim.

      ## Display modes (instructions parameter)

      `instructions: false` (default) — artifact appears as a standalone card in the
      chat thread. Your reply is plain prose; do NOT embed any tag in your text.
      Use when the artifact IS the main answer.

      `instructions: true` — the tool result provides an opaque embed token that you
      MUST paste verbatim into your reply at the exact position where the artifact
      should appear inline. Do NOT construct or guess this token — only use the exact
      string returned by the tool.
      Use when the artifact is a supporting detail within flowing prose.

      ## Inline component shortcut (no CreateArtifact needed)

      For auto-registered components you may write the component's tag name directly
      in your reply text as raw HTML — for example:

        Here is a reaction bar: <example-reaction-bar/>

      This shortcut only works for tags listed in the **Auto-registered components**
      catalog below. Prefer it when persistence is not needed.

      ## preview parameter (optional)

      Short one-sentence description shown before the artifact loads.
      Example: `"Bar chart comparing Q1–Q4 revenue by region."`

      ## Rules
      - Component tag mode: only use tag names from the auto-registered catalog.
      - Package mode: copy the package JSON verbatim from the catalog.
      - **Artifact embed tokens:** the only valid way to write an artifact embed in
        your reply is to paste the exact string the CreateArtifact tool returned
        when `instructions=true`. Never construct, guess, or type an artifact tag
        yourself — not as a placeholder, not as an example, not in any other context.
        If you have not just called CreateArtifact with `instructions=true`, there
        is no embed token to paste.
    tools:
      - app.agents:create_artifact

  - name: debug_agent_prompt
    kind: function.lua
    meta:
      comment: |
        Compiles an agent and returns its final system prompt. Used to verify
        build_func contributions without burning LLM tokens.
    source: file://debug_agent_prompt.lua
    modules:
      - http
    imports:
      compiler: wippy.agent.compiler:compiler
      agent_registry: wippy.agent.discovery:registry
    method: handler

  - name: debug_agent_prompt.endpoint
    kind: http.endpoint
    meta:
      router: app:api.public
    method: GET
    func: debug_agent_prompt
    path: /debug/agent-prompt

  - name: build_artifacts_catalog
    kind: function.lua
    meta:
      type: function
      comment: |
        Reads view.component registry + bundled wippy-meta.json and emits a
        markdown catalog of usable tag_names/props/events. Wired into
        wippy_artifacts_trait via build_func_id — runs once per agent compile.
    source: file://build_artifacts_catalog.lua
    modules:
      - json
    imports:
      component_registry: wippy.views:component_registry
      bundled_meta: wippy.views:bundled_meta
      page_registry: wippy.views:page_registry
    method: execute

  - name: create_artifact
    kind: function.lua
    meta:
      type: tool
      title: Create Artifact
      input_schema: |
        {
          "type": "object",
          "properties": {
            "title": {
              "type": "string",
              "description": "Title for the artifact"
            },
            "content": {
              "type": "string",
              "description": "Content body. Text mode: HTML or Markdown string. Package mode: full package JSON string copied verbatim from the catalog. Component tag mode: leave empty."
            },
            "content_type": {
              "type": "string",
              "description": "MIME type. text/markdown or text/html for text mode. application/json for package mode (non-auto-registered components or SPA pages). Not used in component tag mode.",
              "enum": ["text/html", "text/markdown", "application/json"],
              "default": "text/markdown"
            },
            "tag_name": {
              "type": "string",
              "description": "Component tag mode only: web component tag name (e.g. 'example-mermaid'). Must be from the auto-registered catalog. When set, the artifact renders using this component."
            },
            "props": {
              "type": "object",
              "description": "Props object passed to the web component. Only used with tag_name."
            },
            "preview": {
              "type": "string",
              "description": "Optional short one-sentence description shown before the artifact loads. Example: 'Bar chart comparing Q1–Q4 revenue by region.'"
            },
            "instructions": {
              "type": "boolean",
              "description": "Display mode. false (default) — artifact appears as a standalone card in the chat; reply with plain prose, no embed tag. true — the tool result provides an embed tag that you paste verbatim into your reply where the artifact should appear inline.",
              "default": false
            }
          },
          "required": ["title"],
          "additionalProperties": false
        }
      llm_alias: CreateArtifact
      llm_description: |
        Create a rich content artifact rendered in the chat (persists in history).
        Three content modes: (1) Text mode — title + content (HTML or Markdown).
        (2) Component tag mode — title + tag_name + props for auto-registered components.
        (3) Package mode — title + content_type="application/json" + content=full package JSON for non-auto-registered components or SPA pages (copy JSON from catalog).
        Display mode via instructions: false (default) = standalone card; true = inline embed tag returned in tool result for you to paste into your reply.
    source: file://create_artifact.lua
    modules:
      - json
    imports: {}
    method: handler
    pool:
      size: 2

  - name: navigate_to
    kind: function.lua
    meta:
      type: tool
      title: Navigate To Page
      input_schema: |
        {
          "type": "object",
          "properties": {
            "page": {
              "type": "string",
              "description": "The page to navigate to",
              "enum": [
                "home",
                "users"
              ]
            }
          },
          "required": ["page"],
          "additionalProperties": false
        }
      llm_alias: NavigateTo
      llm_description: Open a page in the UI for the user.
    source: file://navigate_to.lua
    modules:
      - ctx
    imports: {}
    method: handler
    pool:
      size: 2
